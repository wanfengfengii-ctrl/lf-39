<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}漏刻复原研究系统{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='css/theme.css') }}">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.plot.ly/plotly-2.27.0.min.js" charset="utf-8"></script>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="/">
        <span class="brand-seal">⌛</span>
        <div class="brand-text">
          <h1>漏刻复原研究</h1>
          <span class="brand-sub">古代计时仪器校准实验平台</span>
        </div>
      </a>
      <nav class="site-nav">
        <a href="/">项目总览</a>
        <span class="nav-divider">｜</span>
        <a href="https://zh.wikipedia.org/wiki/%E6%BC%8F%E5%88%BB" target="_blank" rel="noopener">关于漏刻</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="footer-inner">
      <span>© 博物馆古代科技史研究室 · 漏刻复原数字化平台</span>
    </div>
  </footer>

  <div id="toast-container" class="toast-container"></div>

  <script src="{{ url_for('static', path='js/validation.js') }}"></script>
  <script src="{{ url_for('static', path='js/chart.js') }}"></script>
  <script src="{{ url_for('static', path='js/interaction.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
